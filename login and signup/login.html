<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Krishi Sanjal</title>
  <link rel="stylesheet" href="login.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
  
  <header>
    <div class="header-container">
      <img src="/logo.jpeg" alt="Krishi Sanjal Logo" class="logo">
      <h1>Krishi Sanjal</h1>
    </div>
  </header>

  
  <div class="form">
    <form action="">
      <h1>Login to Krishi Sanjal</h1>
      
      <div class="input-box">
        <div class="input-field">
          <input type="text" placeholder="Username or Email" required>
          <i class='bx bxs-user'></i>
        </div>
      </div>
      
      <div class="input-box">
        <div class="input-field">
          <input type="password" placeholder="Password" required>
          <i class="bx bxs-lock-alt"></i>
        </div>
      </div>

     
      <div class="input-box">
        <div class="dropdown">
          <button type="button" class="dropbtn">Login as</button>
          <div class="dropdown-content">
            <a href="/login/farmer_login.html">Login as Farmer</a>
            <a href="/login/consumer_login.html">Login as Consumer</a>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <a href="#" class="forgot-password">Forgot Password?</a>
        <p>Don't have an account? <a href="/login and signup/signup.html" class="create-account">Create New Account</a></p>
      </div>
    </form>
  </div>
</body>

</html>
